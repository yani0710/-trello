<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>мини Trello | Админ панел</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge">mT</div>
        <div>
          <h1 style="margin-bottom: 4px;">Администраторски панел</h1>
          <p class="muted">Управление на потребители, активност и достъп до бордове.</p>
        </div>
      </div>
      <div class="topbar-actions">
        <a class="btn" href="/dashboard.html">Dashboard</a>
        <button class="btn btn-secondary" id="logoutBtn">Изход</button>
      </div>
    </header>

    <section class="grid-4" id="adminStats"></section>

    <section class="panel" style="margin-top: 24px;">
      <h2>Потребители</h2>
      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>Потребител</th>
              <th>Роля</th>
              <th>Статус</th>
              <th>Бордове</th>
              <th>Последна активност</th>
              <th>Действия</th>
            </tr>
          </thead>
          <tbody id="usersTable"></tbody>
        </table>
      </div>
    </section>

    <section class="grid-2" style="margin-top: 24px; align-items: start;">
      <div class="panel">
        <h2>Управление на достъпа</h2>
        <div id="membershipNotice" class="notice"></div>
        <form id="membershipForm">
          <div class="field">
            <label for="membershipUser">Потребител</label>
            <select class="select" id="membershipUser" name="userId"></select>
          </div>
          <div class="field">
            <label for="membershipBoard">Борд</label>
            <select class="select" id="membershipBoard" name="boardId"></select>
          </div>
          <div class="inline-actions">
            <button class="btn btn-primary" type="button" data-membership="add">Добави достъп</button>
            <button class="btn btn-danger" type="button" data-membership="remove">Премахни достъп</button>
          </div>
        </form>
      </div>

      <div class="panel">
        <h2>Последна активност</h2>
        <div id="activityList" class="history-list"></div>
      </div>
    </section>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/common.js"></script>
  <script src="/assets/js/admin.js"></script>
</body>
</html>
